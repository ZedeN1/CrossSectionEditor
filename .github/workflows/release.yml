name: Release QGIS Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Configure git for gh-pages push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/ZedeN1/CrossSectionEditor.git

      - name: Create GitHub Release
        run: gh release create ${GITHUB_REF_NAME} --title "${GITHUB_REF_NAME}" --notes ""
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy Release and Update XML
        run: >
          qgis-plugin-ci release ${GITHUB_REF_NAME}
          --github-token ${{ secrets.GITHUB_TOKEN }}
          --create-plugin-repo
